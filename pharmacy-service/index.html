<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pharmacy Service | Login</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-login">

<div class="layout layout--centered">
  <main class="login-card">
    <header class="login-card__header">
      <h1 class="login-card__title">pharmacy service</h1>
      <p class="login-card__subtitle">please enter your details</p>
    </header>

    <div class="login-card__form">
      <div class="form-group">
        <label class="form-group__label" for="user">username</label>
        <input class="form-group__input" type="text" id="user" placeholder="enter username">
      </div>

      <div class="form-group">
        <label class="form-group__label" for="pass">password</label>
        <input class="form-group__input" type="password" id="pass" placeholder="enter password">
      </div>

      <a href="users.html" class="button button--primary button--block">sign in</a>
      
      <div class="notification notification--error">
        invalid username or password
      </div>
    </div>
  </main>
</div>

</body>
</html>
